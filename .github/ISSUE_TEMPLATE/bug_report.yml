name: Bug 报告 / Bug Report
description: Bug / 使用问题 / 识别错误等 / Bug, Usage Issue, Recognition Error, etc.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        📖 **提交前请阅读 [问题反馈指南](https://github.com/MaaEnd/MaaEnd/blob/v2/docs/zh_cn/users/troubleshooting.md)。**  
        ⚠️ **请先更新到最新版本的 MaaEnd，确认问题是否仍然存在后再提交 Issue。**

  - type: textarea
    id: description
    attributes:
      label: 问题描述及复现步骤
      placeholder: |
        预期行为: ...
        实际行为: ...
        复现步骤:
        1. ...
        2. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志文件
      description: |
        💡 点击界面上“运行日志”右上角的 🗄️ 导出日志文件。  
        ⚠️ **请将上传导出后的 `MaaEnd-logs-xxx.zip` 文件** ⚠️  
        ❌ 不要复制文字发送。  
        ❌ 不要截图日志。
    validations:
      required: true

  - type: textarea
    id: screenshot
    attributes:
      label: 软件画面截图
      description: |
        请提供出现问题时完整的 MaaEnd 软件画面截图。
        ❌ 不要留空。
    validations:
      required: true

  - type: textarea
    id: game_screenshot
    attributes:
      label: 游戏画面截图
      description: |
        请提供出现问题时的游戏画面截图，以便定位识别或操作相关问题。
        ❌ 不要留空。
    validations:
      required: true
