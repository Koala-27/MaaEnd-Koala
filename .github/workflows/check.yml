name: check

on:
  push:
    branches:
      - "v2"
    paths:
      - ".github/workflows/check.yml"
      - "assets/**"
      - "tools/schema/**"
      - "package.json"
      - "maatools.config.mts"

  pull_request:
    branches:
      - "**"
    paths:
      - ".github/workflows/check.yml"
      - "assets/**"
      - "tools/schema/**"
      - "package.json"
      - "maatools.config.mts"

  workflow_dispatch:

jobs:
  resource:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Run maa-checker
        run: |
          pnpm i
          pnpm run check

      - name: Validate JSON Schema
        run: |
          python -m pip install jsonschema==4.26.0 referencing==0.37.0
          python tools/validate_schema.py --resource-dirs assets/resource --exclude-dirs assets/resource/gamedata assets/resource/image assets/resource/model --task-dirs assets/tasks
